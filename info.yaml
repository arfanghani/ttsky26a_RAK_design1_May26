# Tiny Tapeout project information
project:
  title:        "NeuroSpike Encoder"      # Project title
  author:       "AG - Emirates Chips Competence"      # Your name
  discord:      "N/A"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Spiking neuron model with threshold and leak dynamics"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_neurospike"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_neurospike.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Stimulus input"
  ui[1]: "Increase threshold"
  ui[2]: "Decrease threshold"
  ui[3]: "Reset neuron"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Spike output"
  uo[1]: "Membrane bit 0"
  uo[2]: "Membrane bit 1"
  uo[3]: "Membrane bit 2"
  uo[4]: "Membrane bit 3"
  uo[5]: "Membrane bit 4"
  uo[6]: "Membrane bit 5"
  uo[7]: "Membrane bit 6"

  # Bidirectional pins
  uio[0]: "Threshold bit 0"
  uio[1]: "Threshold bit 1"
  uio[2]: "Threshold bit 2"
  uio[3]: "Threshold bit 3"
  uio[4]: "Threshold bit 4"
  uio[5]: "Threshold bit 5"
  uio[6]: "Threshold bit 6"
  uio[7]: "Threshold bit 7"

# Do not change!
yaml_version: 6
